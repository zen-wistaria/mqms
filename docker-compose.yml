name: mqms
services:
  app:
    build: .
    image: mqms:latest
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/prisma
    environment:
      - DATABASE_URL=file:./prisma/prod.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://localhost:3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - migrate
    restart: unless-stopped

  migrate:
    image: mqms:latest
    command: ["bun", "db:migrate"]
    volumes:
      - db_data:/app/prisma
    environment:
      - DATABASE_URL=file:./prisma/prod.db

  worker:
    image: mqms:latest
    command: ["bun", "worker.js"]
    volumes:
      - db_data:/app/prisma
    environment:
      - DATABASE_URL=file:./prisma/prod.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-60000}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-300000}
    depends_on:
      - migrate
    restart: unless-stopped

volumes:
  db_data:

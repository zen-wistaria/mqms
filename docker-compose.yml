name: mqms
services:
  app:
    build: .
    image: mqms:latest
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/data
      - /lib/modules:/lib/modules:ro
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    depends_on:
      - migrate
    restart: unless-stopped

  migrate:
    image: mqms:latest
    command: ["bun", "db:migrate"]
    volumes:
      - db_data:/app/data

  worker:
    image: mqms:latest
    command: ["bun", "worker.js"]
    volumes:
      - db_data:/app/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POLLING_INTERVAL_MS=${POLLING_INTERVAL_MS:-60000}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-300000}
    depends_on:
      - migrate
    restart: unless-stopped

volumes:
  db_data:

# Build & Push Docker Image to Docker Hub
#
# Triggers:
#   - push ke branch main     → tag :latest + :<sha>
#   - push tag v*             → tag :<semver> + :latest
#
# Required secrets (set di GitHub repo Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN
#
# Image name: <dockerhub-username>/mqms

name: Docker Build & Push

on:
  # push:
    # branches:
    #   - main
    # tags:
    #   - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: mqms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to Docker Hub
        uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20 # v3.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          {
            echo "tags<<__EOF__"
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              VERSION="${{ github.ref_name }}"
              echo "${USERNAME}/${IMAGE_NAME}:${VERSION#v}"
              echo "${USERNAME}/${IMAGE_NAME}:latest"
            else
              echo "${USERNAME}/${IMAGE_NAME}:latest"
              echo "${USERNAME}/${IMAGE_NAME}:${{ github.sha }}"
            fi
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@2cdde995de11925a030ce8070c3d77a52ffcf1c0 # v5.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
